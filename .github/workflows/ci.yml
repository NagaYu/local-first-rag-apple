name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  build-example:
    name: Build Examples/NotesApp
    runs-on: macos-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build example
        working-directory: Examples/NotesApp
        run: swift build
